# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                    tmux — Hacker Edition  Catppuccin Mocha                ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  PLUGINS (auto-installed on first start via TPM)                          ║
# ║  ─────────────────────────────────────────────────────────────────────    ║
# ║  catppuccin/tmux        — status bar theme                                ║
# ║  tmux-sensible          — sane defaults                                   ║
# ║  tmux-resurrect         — save/restore sessions across reboots            ║
# ║  tmux-continuum         — auto-save every 15 min, auto-restore on start   ║
# ║  tmux-yank              — y to yank to clipboard in copy mode             ║
# ║  tmux-cpu               — CPU % in status bar                            ║
# ║  vim-tmux-navigator     — seamless C-h/j/k/l nav across vim/tmux panes   ║
# ║  tmux-sessionx          — fuzzy session picker (prefix + O)              ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  FIRST TIME SETUP                                                         ║
# ║  ─────────────────────────────────────────────────────────────────────    ║
# ║  TPM and plugins auto-install on the first tmux start.                    ║
# ║  To manually install/update: prefix + I  (capital i)                     ║
# ║  To update plugins:          prefix + U                                   ║
# ║  To remove unused plugins:   prefix + alt + u                             ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  KEY REFERENCE   prefix = Ctrl-a                                          ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  SESSIONS                                                                 ║
# ║  prefix + C-c          New session                                        ║
# ║  prefix + O            Sessionx fuzzy picker (live preview!)             ║
# ║  prefix + C-f          Find session by name                               ║
# ║  prefix + $            Rename current session                             ║
# ║  prefix + s            List all sessions                                  ║
# ║  prefix + K            Kill current session (with confirm)                ║
# ║  prefix + d            Detach from session                                ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  WINDOWS (tabs)                                                           ║
# ║  prefix + c            New window (inherits current path)                 ║
# ║  prefix + ,            Rename current window                              ║
# ║  prefix + &            Kill current window                                ║
# ║  prefix + C-h          Previous window                                    ║
# ║  prefix + C-l          Next window                                        ║
# ║  prefix + Tab          Last active window                                 ║
# ║  prefix + 0-9          Jump to window by number                           ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  PANES                                                                    ║
# ║  prefix + -            Split horizontally (new pane below)                ║
# ║  prefix + |            Split vertically   (new pane right)                ║
# ║  prefix + h/j/k/l      Navigate panes (vim-style)                         ║
# ║  C-h / C-j / C-k / C-l Navigate panes AND vim windows seamlessly          ║
# ║  prefix + H/J/K/L      Resize pane (repeatable)                           ║
# ║  prefix + z            Zoom/unzoom current pane (maximise)                ║
# ║  prefix + x            Kill current pane                                  ║
# ║  prefix + q            Show pane numbers (press number to jump)           ║
# ║  prefix + {            Swap pane with previous                            ║
# ║  prefix + }            Swap pane with next                                ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  COPY MODE  (vi keys)                                                     ║
# ║  prefix + Enter        Enter copy mode                                    ║
# ║  v                     Start selection                                    ║
# ║  C-v                   Rectangle selection                                ║
# ║  y                     Copy selection + exit                              ║
# ║  H / L                 Start / end of line                                ║
# ║  /                     Search forward                                     ║
# ║  ?                     Search backward                                    ║
# ║  q / Escape            Exit copy mode                                     ║
# ║  prefix + y            Copy tmux buffer to system clipboard               ║
# ║  prefix + p            Paste from tmux buffer                             ║
# ║  prefix + P            Choose paste buffer                                ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  SESSIONS PERSIST                                                         ║
# ║  prefix + C-s          Manually save session (tmux-resurrect)             ║
# ║  prefix + C-r          Restore last saved session                         ║
# ║  Auto-save every 15 min; auto-restored on tmux start (continuum)         ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║  MISC                                                                     ║
# ║  prefix + r            Reload this config file                            ║
# ║  prefix + ?            Show all keybindings                               ║
# ║  prefix + t            Show clock                                         ║
# ║  prefix + i            Show pane info                                     ║
# ║  Mouse enabled: click to select panes/windows, drag to resize             ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

# ── Terminal & true colour ─────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",alacritty:RGB"
set -as terminal-features ",xterm-256color:RGB"
# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
# Allow passthrough sequences (fixes Nerd Font icon rendering inside tmux)
set -g allow-passthrough on
# Proper Unicode width handling
set -g extended-keys on

# ── Core settings ──────────────────────────────────────────────────────────────
set  -g  history-limit   50000
set  -s  escape-time     0            # no ESC delay — critical for vim
set  -sg repeat-time     600
set  -s  focus-events    on
set  -g  base-index      1            # windows start at 1
setw -g  pane-base-index 1            # panes start at 1
set  -g  renumber-windows on
set  -g  set-titles      on
set  -g  set-titles-string "#S  #W"
set  -g  display-panes-time 2000
set  -g  display-time    1500
set  -g  status-interval 5
set  -g  monitor-activity on
set  -g  visual-activity  off
set  -g  mouse            on
set  -g  set-clipboard    on
set  -wg mode-keys        vi
set  -wg xterm-keys       on
setw -q  -g utf8          on

# ── Prefix: Ctrl-a (GNU Screen style) ─────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix            # C-a C-a sends literal C-a to the shell

# ── Config reload ──────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "  tmux.conf reloaded"

# ── Splitting (inherit current path) ──────────────────────────────────────────
bind -  split-window -v  -c "#{pane_current_path}"
bind |  split-window -h  -c "#{pane_current_path}"
bind _  split-window -v  -c "#{pane_current_path}"
bind "'" split-window -h  -c "#{pane_current_path}"
bind c  new-window       -c "#{pane_current_path}"

# ── Pane navigation ────────────────────────────────────────────────────────────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind >   swap-pane -D
bind <   swap-pane -U

# ── Smart pane switching — aware of vim splits (vim-tmux-navigator) ────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys 'C-\\'" "select-pane -l"
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# ── Pane resizing (repeatable) ─────────────────────────────────────────────────
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# ── Window navigation ──────────────────────────────────────────────────────────
unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind   Tab  last-window
bind   C-c  new-session
bind   C-f  command-prompt -p "find-session:" "switch-client -t %%"

# ── Copy mode (vi) ─────────────────────────────────────────────────────────────
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind -T copy-mode-vi Escape send -X cancel
# Linux clipboard (xclip fallback to xsel)
bind y run "tmux save-buffer - | xclip -in -selection clipboard 2>/dev/null || tmux save-buffer - | xsel --clipboard --input 2>/dev/null" \; display-message "  Copied to clipboard"

# ── Buffers ────────────────────────────────────────────────────────────────────
bind b list-buffers
bind p paste-buffer
bind P choose-buffer

# ── Quick helpers ──────────────────────────────────────────────────────────────
bind K confirm-before -p "Kill session #S? (y/n)" kill-session
bind x kill-pane
bind q display-panes

# ── Catppuccin theme configuration (v2 API) ──────────────────────────────────
set -g @catppuccin_flavor "mocha"              # latte / frappe / macchiato / mocha
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_flags "icon"

# ── tmux-resurrect ─────────────────────────────────────────────────────────────
set -g @resurrect-strategy-nvim "session"   # restore nvim sessions too
set -g @resurrect-capture-pane-contents "on"

# ── tmux-continuum ─────────────────────────────────────────────────────────────
set -g @continuum-restore "on"              # auto-restore on tmux start
set -g @continuum-save-interval "15"        # auto-save every 15 min

# ── tmux-sessionx ──────────────────────────────────────────────────────────────
set -g @sessionx-bind "O"                   # prefix + O  → fuzzy session picker
set -g @sessionx-window-height "85%"
set -g @sessionx-window-width "75%"
set -g @sessionx-preview-enabled "true"
set -g @sessionx-filter-current "false"
set -g @sessionx-additional-options "--no-header --prompt '  '"

# ── TPM plugin list ────────────────────────────────────────────────────────────
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "catppuccin/tmux#v2.1.2"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-cpu"
set -g @plugin "christoomey/vim-tmux-navigator"
set -g @plugin "omerxx/tmux-sessionx"

# ── Local overrides (unmanaged — safe for per-machine tweaks) ─────────────────
source -q ~/.tmux.conf.local

# ── Bootstrap TPM (auto-clones + installs plugins on first tmux start) ─────────
TPM_PATH="$HOME/.tmux/plugins/tpm"
if "test ! -d $TPM_PATH" \
  "run 'git clone --depth=1 https://github.com/tmux-plugins/tpm $TPM_PATH \
        && $TPM_PATH/bin/install_plugins'"
run "$TPM_PATH/tpm"

# ── Catppuccin v2: load theme AFTER TPM, then set status bar ─────────────────
# In v2, catppuccin provides status module functions that must be called after
# the plugin is loaded by TPM.
run "#{@catppuccin_flavor_dir}/catppuccin.tmux"

# Status bar — use catppuccin module functions
set -g status-left ""
set -gF status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_session}#{E:@catppuccin_status_cpu}#{E:@catppuccin_status_date_time}"

set -g @catppuccin_date_time_text " %H:%M  %d %b"
